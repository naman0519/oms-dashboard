<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics - JSKB OMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-white p-4">

    <div class="container">
        <h1 class="mb-4">📈 Business Analytics</h1>

        <!-- Monthly Revenue Chart -->
        <div class="card bg-secondary text-white p-4 rounded-4 mb-4">
            <h3>📈 Monthly Revenue</h3>
            <canvas id="monthlyRevenueChart"></canvas>
        </div>

        <!-- Top Products -->
        <div class="card bg-secondary text-white p-4 rounded-4 mb-4">
            <h3>🏆 Top 5 Products</h3>
            <div id="topProductsList"></div>
        </div>

        <!-- Top Customers -->
        <div class="card bg-secondary text-white p-4 rounded-4 mb-4">
            <h3>👥 Top 5 Customers</h3>
            <div id="topCustomersList"></div>
        </div>
    </div>

    <script src="/static/js/analytics.js?v=2"></script>
</body>
</html>
