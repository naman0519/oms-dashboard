<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - JSKB OMS</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-dark text-white">

<div class="container py-5">
    <h1 class="mb-4">⚙️ System Settings</h1>

<div class="card bg-secondary text-white p-4 rounded-4 shadow-lg settings-main-card">
        <!-- Low Stock Threshold -->
        <div class="mb-3">
            <label for="lowStockThreshold" class="form-label">
                Low Stock Threshold
            </label>
           <input type="number" id="lowStockThreshold" class="form-control">
        </div>

        <!-- Auto Approve -->
        <div class="form-check form-switch mb-3">
           <input type="checkbox" id="autoApprove" class="form-check-input">
            <label class="form-check-label" for="autoApprove">
                Auto Approve Orders
            </label>
        </div>

        <!-- Notifications -->
        <div class="form-check form-switch mb-4">
            <input type="checkbox" id="notificationsEnabled" class="form-check-input">

            <label
                class="form-check-label"
                for="notificationsEnabled"
            >
                Enable Notifications
            </label>
        </div>

        <!-- Save Button -->
        <button id="saveSettingsBtn" class="btn btn-primary w-100">
    Save Settings
</button>
    </div>
</div>

<!-- Change Password Card -->
<!-- Change Admin Password -->
<div class="password-card mt-5">
    <h2 class="password-title">🔐 Change Admin Password</h2>

    <div class="mb-3">
        <label class="form-label">Current Password</label>
        <input
            type="password"
            id="currentPassword"
            class="form-control"
            placeholder="Enter current password">
<form id="changePasswordForm" class="password-card mt-5">

    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input
            type="password"
            id="newPassword"
            class="form-control"
            placeholder="Enter new password">
    </div>

    <div class="mb-3">
        <label class="form-label">Confirm New Password</label>
        <input
            type="password"
            id="confirmPassword"
            class="form-control"
            placeholder="Confirm new password">
    </div>

<div class="form-check mt-3 mb-3">
    <input
        class="form-check-input"
        type="checkbox"
        id="togglePasswords"
    >
    <label
        class="form-check-label"
        for="togglePasswords"
    >
        Show Passwords
    </label>
</div>

<button id="changePasswordBtn" class="btn btn-warning w-100">
    Change Password
</button>
    </form>
</div>

<!-- Settings JavaScript -->
<script src="/static/js/settings.js"></script>

<link rel="stylesheet" href="/static/css/style.css">

</body>
</html>
