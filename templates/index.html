<!DOCTYPE html>
<html>

<head>
    <title>OMS Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

    <h2>Place Order</h2>

    <div class="mt-4">

        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">

        <input type="text" id="product" class="form-control mb-3" placeholder="Enter Product">

        <input type="text" id="phone" class="form-control mb-3" placeholder="Enter Phone Number">

        <input type="number" id="qty" class="form-control mb-3" placeholder="Enter Quantity">

        <button onclick="placeOrder()" class="btn btn-primary">
            Order Now
        </button>

    </div>

    <!-- JS FILE CONNECT -->
    <script src="/static/js/app.js"></script>

</body>

</html>
