<!DOCTYPE html>
<html>
<head>
    <title>Products Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark text-white p-4">

<div class="container">
    <h1 class="products-title"> Products Update</h1>
    
    <!-- INVENTORY SUMMARY CARDS -->
<div class="row g-4 mb-4" id="inventorySummary">

    <div class="col-md-3">
        <div class="products-card text-center">
            <h6 class="text-secondary">📦 Total Products</h6>
            <h2 id="totalProductsCount">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="products-card text-center">
            <h6 class="text-secondary">🏷️ Total Stock</h6>
            <h2 id="totalStockCount">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="products-card text-center">
            <h6 class="text-secondary">⚠️ Low Stock</h6>
            <h2 id="lowStockCount">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="products-card text-center">
            <h6 class="text-secondary">💰 Inventory Value</h6>
            <h2 id="inventoryValue">₹0</h2>
        </div>
    </div>

</div>

    <!-- LOW STOCK ALERTS -->
<div class="products-card mb-4">
    <h4 class="text-danger mb-3">⚠️ Low Stock Alerts</h4>
    <div id="lowStockAlerts"></div>
</div>

    <!-- Add Product Form -->
    <div class="products-card mb-4">
        <h4 class="mb-3">➕ Add New Product</h4>

        <div class="row g-3">
           <div class="col-md-4">
    <select id="productName" class="form-select" required>
        <option value="">Select Product</option>
        <option value="urea">Urea</option>
        <option value="dap">DAP</option>
        <option value="npk">NPK</option>
        <option value="potash">Potash</option>
        <option value="zinc">Zinc</option>
        <option value="sulphur">Sulphur</option>
        <option value="sagarika">Sagarika</option>
        <option value="atrazine">Atrazine</option>
        <option value="glyphosate">Glyphosate</option>
        <option value="seeds">Seeds</option>
        <option value="sardar nutri">Sardar Nutri</option>
    </select>
</div>

            <div class="col-md-3">
                <input type="number" id="productStock" class="form-control" placeholder="Stock">
            </div>

            <div class="col-md-3">
                <input type="number" id="productPrice" class="form-control" placeholder="Price">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="addProduct()">
                    Add Product
                </button>
            </div>
        </div>
    </div>

    <!-- Product List -->
    <div class="products-card">
        <h4 class="mb-3">📦 Product List</h4>

        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Stock</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productsTable"></tbody>
        </table>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
